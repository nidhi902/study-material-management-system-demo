<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Role Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="mb-3">Signup Form</h3>

    <div class="mb-3">
      <label for="role" class="form-label">Select Role</label>
      <select id="role" class="form-select">
        <option value="">-- Select --</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </div>

    <div id="access-box" class="mb-3" style="display:none;">
      <label for="access-code" class="form-label">Access Code</label>
      <input type="text" id="access-code" class="form-control" placeholder="Enter Access Code">
    </div>

    <button class="btn btn-primary w-10">Signup</button>
  </div>
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Custom JS -->
<script>
  const roleSelect = document.getElementById("role");
  const accessBox = document.getElementById("access-box");

  roleSelect.addEventListener("change", () => {
    accessBox.style.display = (roleSelect.value === "teacher") ? "block" : "none";
  });
</script>

</body>
</html>
